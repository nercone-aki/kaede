name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-openssl:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.openssl-version.outputs.version }}
      cache-key: ${{ steps.openssl-version.outputs.cache-key }}

    steps:
      - name: Resolve latest OpenSSL 3.x version
        id: openssl-version
        run: |
          VERSION=$(curl -fsSL "https://api.github.com/repos/openssl/openssl/releases?per_page=100" \
            | jq -r '[.[] | select(.prerelease == false and .draft == false) | select(.tag_name | test("^openssl-3\\.")) | .tag_name] | first | ltrimstr("openssl-")')
          echo "Resolved OpenSSL version: ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "cache-key=openssl-${VERSION}-${{ runner.os }}-v3" >> $GITHUB_OUTPUT

      - name: Cache OpenSSL build
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ~/openssl-3
          key: ${{ steps.openssl-version.outputs.cache-key }}

      - name: Build OpenSSL ${{ steps.openssl-version.outputs.version }}
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ steps.openssl-version.outputs.version }}"
          sudo apt-get update -q
          sudo apt-get install -y build-essential
          curl -fsSL "https://github.com/openssl/openssl/releases/download/openssl-${VERSION}/openssl-${VERSION}.tar.gz" \
            | tar xz
          cd "openssl-${VERSION}"
          ./Configure --prefix="$HOME/openssl-3" --openssldir="$HOME/openssl-3" --libdir=lib shared no-docs
          make -j$(nproc)
          make install_sw

  test:
    needs: build-openssl
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Restore OpenSSL build cache
        uses: actions/cache/restore@v4
        with:
          path: ~/openssl-3
          key: ${{ needs.build-openssl.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Register OpenSSL with ldconfig and set KAEDE_OPENSSL
        run: |
          LIBSSL=$(find "$HOME/openssl-3/lib" -name "libssl.so.3" | head -1)
          echo "Found libssl at: ${LIBSSL}"
          test -n "${LIBSSL}" || { echo "libssl.so.3 not found under $HOME/openssl-3/lib"; exit 1; }
          echo "$HOME/openssl-3/lib" | sudo tee /etc/ld.so.conf.d/openssl35.conf
          sudo ldconfig
          echo "KAEDE_OPENSSL=${LIBSSL}" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest --tb=short -v
